<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hero · Artistry In Every Blink</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Reusable hero: Artistry In Every Blink -->
    <section id="hero" class="hero-section">
        <div class="hero-content">
            <div class="hero-text-wrap">
                <h1 class="hero-title fade-in-up">
                    ARTISTRY<br>
                    IN EVERY<br>
                    BLINK
                </h1>
                <p class="hero-subtitle fade-in-up delay-1">
                    PREMIUM LASH EXTENSIONS<br>
                    TAILORED TO YOUR BEAUTY
                </p>
                <div class="hero-cta-btn fade-in-up delay-2">
                    <a href="#book" class="btn btn-dark">BOOK YOUR APPOINTMENT</a>
                </div>
            </div>
        </div>
        <div class="hero-image-container">
            <div class="hero-images-grid">
                <div class="hero-img-col">
                    <img src="assets/images/hero-1.jpg" alt="Thao Eyelash Model 1" class="hero-grid-img">
                </div>
                <div class="hero-img-col">
                    <img src="assets/images/hero-2.jpg" alt="Thao Eyelash Model 2" class="hero-grid-img">
                </div>
                <div class="hero-img-col">
                    <img src="assets/images/hero-3.jpg" alt="Thao Eyelash Model 3" class="hero-grid-img">
                </div>
            </div>
        </div>
    </section>

    <script>
        requestAnimationFrame(() => {
            requestAnimationFrame(() => {
                document.querySelectorAll('.fade-in-up').forEach((el) => {
                    el.classList.add('appear');
                });
            });
        });
    </script>
</body>
</html>
